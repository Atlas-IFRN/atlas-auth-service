name: Deploy auth-service to production

# Dispara apenas no merge/push para main (produção).
# A branch de desenvolvimento (develop) NÃO dispara deploy.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-auth-service
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy (auth-service)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          command_timeout: 25m
          script: |
            set -e
            PROJECT_DIR="/home/production"
            SERVICE_DIR="$PROJECT_DIR/services/auth"
            cd "$PROJECT_DIR"

            echo "==> Deploy de auth-service ($(date '+%Y-%m-%d %H:%M:%S'))"

            # Produção roda a branch main: força o checkout dela.
            echo "--> Atualizando services/auth para origin/main..."
            git -C "$SERVICE_DIR" fetch origin main
            git -C "$SERVICE_DIR" checkout -B main origin/main

            # Rebuilda e reinicia apenas o(s) container(s) deste serviço.
            echo "--> Rebuildando: auth-service"
            docker compose up -d --build auth-service

            # Recarrega o nginx para re-resolver o upstream. O container recriado
            # ganha um IP novo na rede docker; sem reload, o nginx (upstream
            # estático) segue apontando para o IP antigo e a rota do serviço
            # responde 502. Reload é gracioso.
            docker compose exec -T nginx nginx -s reload || true

            docker image prune -f
            echo ""
            docker compose ps auth-service
            echo "✓ auth-service atualizado."
